version: '3.8'

services:
  # The Spring Boot Application
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Use the service name 'mysql-db' as the host
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/tpFoyer17?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mysql-db

  # MySQL Database
  mysql-db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: tpFoyer17
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
